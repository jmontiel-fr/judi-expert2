<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="#1a365d" stroke="#2b6cb0" stroke-width="0.8"/>

  <!-- Balance beam -->
  <line x1="6" y1="13" x2="26" y2="13" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center pillar -->
  <line x1="16" y1="10" x2="16" y2="24" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="12" y1="24" x2="20" y2="24" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>

  <!-- Left chain -->
  <line x1="8" y1="13" x2="8" y2="18" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Right chain -->
  <line x1="24" y1="13" x2="24" y2="18" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Left pan -->
  <path d="M4,18 Q8,22 12,18" fill="none" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right pan -->
  <path d="M20,18 Q24,22 28,18" fill="none" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Fulcrum -->
  <polygon points="16,9 14,12 18,12" fill="#e2e8f0"/>

  <!-- J -->
  <text x="9" y="17" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#63b3ed" opacity="0.4" text-anchor="middle">J</text>

  <!-- E -->
  <text x="23" y="20" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#63b3ed" opacity="0.4" text-anchor="middle">E</text>
</svg>
