<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="23" fill="#1a365d" stroke="#2b6cb0" stroke-width="1"/>

  <!-- Balance beam (horizontal bar) -->
  <line x1="10" y1="20" x2="38" y2="20" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>

  <!-- Center pillar -->
  <line x1="24" y1="16" x2="24" y2="36" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="18" y1="36" x2="30" y2="36" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left chain -->
  <line x1="12" y1="20" x2="12" y2="27" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- Right chain -->
  <line x1="36" y1="20" x2="36" y2="27" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- Left pan (arc) -->
  <path d="M6,27 Q12,32 18,27" fill="none" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right pan (arc) -->
  <path d="M30,27 Q36,32 42,27" fill="none" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Fulcrum triangle -->
  <polygon points="24,14 21,18 27,18" fill="#e2e8f0"/>

  <!-- Letter J (slightly higher, left) -->
  <text x="14" y="26" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#63b3ed" opacity="0.35" text-anchor="middle">J</text>

  <!-- Letter E (slightly lower, right) -->
  <text x="34" y="30" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#63b3ed" opacity="0.35" text-anchor="middle">E</text>
</svg>
