# ============================================
# Judi-Expert — Site Central (Production Lightsail)
# ============================================
# Architecture: CloudFront (HTTPS) → Lightsail (HTTP ports 3000/8000)
# No reverse proxy — CloudFront routes directly to containers

services:
  backend:
    image: 059247592146.dkr.ecr.eu-west-1.amazonaws.com/judi-expert/central-backend:latest
    container_name: judi-central-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      APP_ENV: "production"
      APP_URL: "https://www.judi-expert.fr"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      COGNITO_APP_CLIENT_ID: "${COGNITO_APP_CLIENT_ID}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      STRIPE_PRICE_TICKET: "${STRIPE_PRICE_TICKET}"
      RECAPTCHA_SITE_KEY: "${RECAPTCHA_SITE_KEY}"
      RECAPTCHA_SECRET_KEY: "${RECAPTCHA_SECRET_KEY}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_DEFAULT_PASSWORD: "${ADMIN_DEFAULT_PASSWORD}"
      TICKET_SECRET: "${TICKET_SECRET}"
      TICKET_VALIDITY_HOURS: "${TICKET_VALIDITY_HOURS}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME}"
      DOMAINES_YAML_PATH: "/data/domaines/domaines.yaml"
      CORPUS_BASE_PATH: "/data/corpus"
      DOCS_PATH: "/data/docs"
      AWS_REGION: "${AWS_REGION}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      MISTRAL_MODEL: "${MISTRAL_MODEL}"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - app_data:/app/data
      - ./domaines:/data/domaines:ro
      - ./corpus:/data/corpus:ro
      - ./docs:/data/docs:ro
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    image: 059247592146.dkr.ecr.eu-west-1.amazonaws.com/judi-expert/central-frontend:latest
    container_name: judi-central-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: judi-central-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  app_data:
  qdrant_data:
