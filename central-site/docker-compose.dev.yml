# ============================================
# Judi-Expert — Site Central (déploiement local)
# ============================================
# Usage : docker compose -f central-site/docker-compose.dev.yml up -d
#
# Services :
#   - db       : PostgreSQL 16 (remplace RDS)
#   - backend  : FastAPI (Site Central API)
#   - frontend : Next.js (Site Central UI)
#
# URLs :
#   - Frontend : http://localhost:3001
#   - Backend  : http://localhost:8001/docs
#   - PostgreSQL : localhost:5433
#
# Note : les ports sont décalés (3001, 8001, 5433) pour ne pas
#        entrer en conflit avec l'Application Locale (3000, 8000).
# ============================================

name: judi-central

services:
  db:
    image: postgres:16-alpine
    container_name: judi-central-db
    environment:
      POSTGRES_USER: judi
      POSTGRES_PASSWORD: judi_dev
      POSTGRES_DB: judi_expert
    ports:
      - "5433:5432"
    volumes:
      - judi-central-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judi -d judi_expert"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./web/backend
      dockerfile: Dockerfile
    container_name: judi-central-backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://judi:judi_dev@db:5432/judi_expert"
      DOMAINES_YAML_PATH: "/data/domaines/domaines.yaml"
      APP_ENV: development
      APP_URL: "http://localhost:3001"
      # Stripe mode test — remplacez par vos clés de test
      STRIPE_SECRET_KEY: "sk_test_CHANGEZ_MOI"
      STRIPE_PUBLISHABLE_KEY: "pk_test_CHANGEZ_MOI"
      STRIPE_WEBHOOK_SECRET: "whsec_CHANGEZ_MOI"
      STRIPE_PRICE_TICKET: "price_CHANGEZ_MOI"
      # Cognito — en mode dev, le backend accepte un bypass auth
      COGNITO_USER_POOL_ID: "local-dev"
      COGNITO_APP_CLIENT_ID: "local-dev"
      # reCAPTCHA clés de test Google (toujours valides)
      RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
      RECAPTCHA_SECRET_KEY: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
      # Admin
      ADMIN_EMAIL: "admin@judi-expert.fr"
      ADMIN_DEFAULT_PASSWORD: "change-me"
      # ECR — pas utilisé en local
      ECR_REGISTRY: "local"
      AWS_REGION: "eu-west-3"
      SES_SENDER_EMAIL: "no-reply@localhost"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../domaines:/data/domaines:ro
      - ../corpus:/data/corpus:ro
      - ./app_locale_package/output:/data/app_locale_package/output:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8001"
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_CHANGEZ_MOI"
    container_name: judi-central-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8001"
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_CHANGEZ_MOI"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  judi-central-pgdata:
