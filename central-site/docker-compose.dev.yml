# ============================================
# Judi-Expert — Site Central (déploiement local)
# ============================================
# Usage : bash scripts-dev/dev-central-start.sh
#    ou : docker compose -f central-site/docker-compose.dev.yml --env-file central-site/.env.dev up -d
#
# Clés Stripe : central-site/.env.dev (ou .env.local) — pas central-site/.env (AWS/prod)
#
# Services :
#   - db       : PostgreSQL 16 (remplace RDS)
#   - backend  : FastAPI (Site Central API)
#   - frontend : Next.js (Site Central UI)
#
# URLs :
#   - Frontend : http://localhost:3001
#   - Backend  : http://localhost:8002/docs
#   - PostgreSQL : localhost:5433
#
# Note : les ports sont décalés (3001, 8002, 5433, 6334) pour ne pas
#        entrer en conflit avec le Site Client (3000, 8000, 8001, 6333).
# ============================================

name: judi-central

services:
  db:
    image: postgres:16-alpine
    container_name: judi-central-db
    environment:
      POSTGRES_USER: judi
      POSTGRES_PASSWORD: judi_dev
      POSTGRES_DB: judi_expert
    ports:
      - "5433:5432"
    volumes:
      - judi-central-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judi -d judi_expert"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./web/backend
      dockerfile: Dockerfile
    container_name: judi-central-backend
    env_file:
      - path: .env.dev
        required: false
      - path: .env.local
        required: false
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://judi:judi_dev@db:5432/judi_expert"
      DOMAINES_YAML_PATH: "/data/domaines/domaines.yaml"
      APP_ENV: development
      APP_URL: "http://localhost:3001"
      # Stripe : lire .env.dev / .env.local via env_file (ne pas surcharger ici)
      # Cognito — en mode dev, le backend accepte un bypass auth
      COGNITO_USER_POOL_ID: "local-dev"
      COGNITO_APP_CLIENT_ID: "local-dev"
      # reCAPTCHA clés de test Google (toujours valides)
      RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
      RECAPTCHA_SECRET_KEY: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
      # Admin
      ADMIN_EMAIL: "admin@judi-expert.fr"
      ADMIN_DEFAULT_PASSWORD: "Admin$123!"
      # Ticket token signing
      TICKET_SECRET: "judi-dev-ticket-secret-2026"
      TICKET_VALIDITY_HOURS: "48"
      # ECR — pas utilisé en local
      ECR_REGISTRY: "local"
      AWS_REGION: "eu-west-3"
      SES_SENDER_EMAIL: "no-reply@localhost"
      # SMTP Gandi — configurer SMTP_PASSWORD dans .env.dev (non versionné)
      SMTP_HOST: "mail.gandi.net"
      SMTP_PORT: "587"
      SMTP_USER: "admin@judi-expert.fr"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_NAME: "Judi-Expert"
      SMTP_NOTIFICATION_TO: "contact@judi-expert.fr"
      QDRANT_URL: "http://qdrant:6333"
      DOCS_PATH: "/data/docs"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      MISTRAL_MODEL: "${MISTRAL_MODEL:-mistral-small-latest}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../domaines:/data/domaines:ro
      - ../corpus:/data/corpus:rw
      - ../docs:/data/docs:ro
      - ./app_client_package/output:/data/app_client_package/output:ro
      - ./VERSION:/app/VERSION:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8002"
        NEXT_PUBLIC_SITE_URL: "http://localhost:3001"
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY:-}"
    container_name: judi-central-frontend
    env_file:
      - path: .env.dev
        required: false
      - path: .env.local
        required: false
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8002"
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY:-}"
    depends_on:
      - backend
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: judi-central-qdrant
    ports:
      - "6334:6333"
    volumes:
      - judi-central-qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  judi-central-pgdata:
  judi-central-qdrant-data:
