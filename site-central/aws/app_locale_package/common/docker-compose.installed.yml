# Judi-Expert - Application Locale (mode installe)
# Utilise les images Docker pre-buildees.

services:
  judi-llm:
    image: ollama/ollama:latest
    container_name: judi-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    restart: unless-stopped

  judi-rag:
    image: qdrant/qdrant:latest
    container_name: judi-rag
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  judi-ocr:
    image: judi-ocr:latest
    container_name: judi-ocr
    ports:
      - "8001:8001"
    volumes:
      - ocr_tmp:/tmp/ocr
    restart: unless-stopped

  judi-web-backend:
    image: judi-web-backend:latest
    container_name: judi-web-backend
    ports:
      - "8000:8000"
    volumes:
      - web_data:/app/data
      - dossiers_data:/app/data/dossiers
    env_file:
      - .env
    restart: unless-stopped

  judi-web-frontend:
    image: judi-web-frontend:latest
    container_name: judi-web-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://judi-web-backend:8000
    depends_on:
      - judi-web-backend
    restart: unless-stopped

volumes:
  ollama_data:
  web_data:
  dossiers_data:
  qdrant_data:
  ocr_tmp:
